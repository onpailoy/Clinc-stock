<style>
  :root {
    --rose:       #D4938A;
    --blush:      #C4A8A2;
    --silver:     #C8CACF;
    --sage:       #8FA48A;
    --brick:      #C0584A;
    --cream:      #F5F0EE;
    --white:      #FDFCFB;
    --text:       #3D3330;
    --text-light: #7A6E6B;
    --shadow:     rgba(61,51,48,0.08);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Sarabun',sans-serif; background:var(--cream); color:var(--text); min-height:100vh; }

.header {
background:var(–white); border-bottom:1px solid rgba(196,168,162,0.3);
padding:0 16px; display:flex; align-items:center; justify-content:space-between;
height:58px; position:sticky; top:0; z-index:100; box-shadow:0 2px 12px var(–shadow);
}
.logo { font-family:‘Playfair Display’,serif; font-size:20px; color:var(–rose); letter-spacing:1px; }
.logo span { color:var(–sage); }
.header-left { display:flex; align-items:center; gap:10px; }
.header-actions { display:flex; gap:8px; }

.sync-dot { width:8px; height:8px; border-radius:50%; background:var(–silver); transition:background 0.3s; flex-shrink:0; }
.sync-dot.online  { background:var(–sage);  box-shadow:0 0 0 3px rgba(143,164,138,0.25); }
.sync-dot.syncing { background:var(–blush); animation:pulse 1s infinite; }
.sync-dot.error   { background:var(–brick); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.btn {
padding:9px 16px; border:none; border-radius:50px;
font-family:‘Sarabun’,sans-serif; font-size:13px; font-weight:600;
cursor:pointer; display:inline-flex; align-items:center; gap:5px;
transition:all 0.22s; white-space:nowrap;
}
.btn-add    { background:linear-gradient(135deg,var(–sage),#7a9478); color:#fff; box-shadow:0 4px 14px rgba(143,164,138,0.35); }
.btn-add:active    { transform:scale(0.97); }
.btn-reduce { background:linear-gradient(135deg,var(–brick),#a84035); color:#fff; box-shadow:0 4px 14px rgba(192,88,74,0.35); }
.btn-reduce:active { transform:scale(0.97); }
.btn-cancel { background:transparent; color:var(–text-light); border:1.5px solid var(–silver); }
.btn-save   { background:linear-gradient(135deg,var(–rose),#c07870); color:#fff; }

.container { max-width:1200px; margin:0 auto; padding:18px 14px; }
.page-title { font-family:‘Playfair Display’,serif; font-size:21px; margin-bottom:3px; }
.page-sub   { font-size:12.5px; color:var(–text-light); margin-bottom:18px; }

.stats-row { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:18px; }
@media(min-width:600px){ .stats-row{ grid-template-columns:repeat(4,1fr); } }
.stat-card { background:var(–white); border-radius:14px; padding:14px 15px; box-shadow:0 2px 10px var(–shadow); border-left:4px solid transparent; }
.stat-card.rose  { border-color:var(–rose); }
.stat-card.sage  { border-color:var(–sage); }
.stat-card.blush { border-color:var(–blush); }
.stat-card.brick { border-color:var(–brick); }
.stat-label { font-size:10.5px; color:var(–text-light); margin-bottom:4px; font-weight:700; text-transform:uppercase; letter-spacing:0.7px; }
.stat-value { font-size:21px; font-weight:700; }
.stat-unit  { font-size:12px; color:var(–text-light); font-weight:400; }

.search-row { display:flex; gap:10px; margin-bottom:14px; align-items:center; }
.search-box { flex:1; position:relative; }
.search-box input {
width:100%; padding:10px 14px 10px 36px;
border:1.5px solid rgba(196,168,162,0.4); border-radius:50px;
background:var(–white); font-family:‘Sarabun’,sans-serif; font-size:14px; color:var(–text); outline:none;
}
.search-box input:focus { border-color:var(–rose); }
.search-box::before { content:‘🔍’; position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:13px; }
.filter-select {
padding:9px 12px; border-radius:50px; border:1.5px solid rgba(196,168,162,0.4);
background:var(–white); font-family:‘Sarabun’,sans-serif; font-size:13px; outline:none; cursor:pointer; color:var(–text);
}

.table-wrap { background:var(–white); border-radius:18px; box-shadow:0 2px 16px var(–shadow); overflow:hidden; }
.table-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }
table { width:100%; border-collapse:collapse; font-size:13px; min-width:740px; }
thead tr { background:linear-gradient(135deg,rgba(143,164,138,0.11),rgba(212,147,138,0.07)); border-bottom:2px solid rgba(196,168,162,0.22); }
th { padding:11px 13px; text-align:left; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.7px; color:var(–text-light); white-space:nowrap; }
tbody tr { border-bottom:1px solid rgba(196,168,162,0.11); transition:background 0.15s; cursor:pointer; }
tbody tr:hover, tbody tr:active { background:rgba(245,240,238,0.8); }
tbody tr:last-child { border-bottom:none; }
td { padding:12px 13px; vertical-align:middle; white-space:nowrap; }
td.drug-name { white-space:normal; min-width:130px; font-weight:500; }
.td-remaining { font-weight:800; font-size:14px; }
.td-remaining.low { color:var(–brick); }

.badge { display:inline-block; padding:3px 10px; border-radius:50px; font-size:11px; font-weight:700; }

.badge-unpaid { background:rgba(192,88,74,0.12); color:var(–brick); }

.modal-overlay { display:none; position:fixed; inset:0; background:rgba(61,51,48,0.45); backdrop-filter:blur(4px); z-index:200; align-items:flex-end; justify-content:center; }
@media(min-width:600px){ .modal-overlay{ align-items:center; } }
.modal-overlay.open { display:flex; }
.modal { background:var(–white); border-radius:22px 22px 0 0; padding:24px 20px 36px; width:100%; max-height:92vh; overflow-y:auto; box-shadow:0 -8px 40px rgba(61,51,48,0.18); animation:slideUp 0.28s ease; }
@media(min-width:600px){ .modal{ border-radius:22px; padding:26px; max-width:500px; animation:fadeIn 0.22s ease; } }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
@keyframes fadeIn  { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.modal-handle { width:40px; height:4px; background:rgba(196,168,162,0.5); border-radius:2px; margin:0 auto 18px; }

.modal-header { display:flex; align-items:center; gap:10px; margin-bottom:20px; }

.form-full  { grid-column:span 2; }
.form-group { display:flex; flex-direction:column; gap:5px; }

.tl-card { background:var(–white); border-radius:12px; padding:11px 14px; margin:7px 0; box-shadow:0 2px 8px var(–shadow); border-left:3px solid transparent; }

position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px);

font-size:13px; font-weight:500; z-index:999; transition:transform 0.3s ease;

}
.toast.show { transform:translateX(-50%) translateY(0); }
</style>

<script>
var drugs     = [];
var movements = [];
var currentDetailFilter = 'all';
var currentDrugId       = null;

// ===== LISTEN FIREBASE =====
db.ref('drugs').on('value', function(snap) {
  drugs = [];
  snap.forEach(function(c) {
    var d = c.val(); d._key = c.key; drugs.push(d);
  });
  renderTable();
  setSyncDot('online');
  document.getElementById('syncStatus').textContent = '🔥 Neverland Clinic — sync real-time ✓';
}, function(err) {
  setSyncDot('error');
  document.getElementById('syncStatus').textContent = '❌ ตรวจสอบ Firebase Rules (read/write = true)';
  showToast('❌ ' + err.message);
});

db.ref('movements').on('value', function(snap) {
  movements = [];
  snap.forEach(function(c) {
    var m = c.val(); m._key = c.key; movements.push(m);
  });
  renderTable();
  if (currentDrugId) renderTimeline();
});

// ===== HELPERS =====
function gid(d) { return d._key || d.id; }

function getRemaining(drugId) {
  return movements
    .filter(function(m){ return m.drugId === drugId; })
    .reduce(function(s,m){ return m.type==='in' ? s+m.qty : s-m.qty; }, 0);
}

function formatDate(s) {
  if (!s) return '—';
  var p = s.split('-');
  return p[2]+'/'+p[1]+'/'+(+p[0]+543);
}

function setSyncDot(state) {
  document.getElementById('syncDot').className = 'sync-dot '+(state||'');
}

function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 3000);
}

function nowTime() {
  var n = new Date();
  return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
}

// ===== RENDER =====
function renderTable() {
  var q  = (document.getElementById('searchInput').value||'').toLowerCase();
  var pf = document.getElementById('filterPaid').value;
  var rows = drugs.filter(function(d){
    return d.name && d.name.toLowerCase().indexOf(q)>=0 && (!pf || d.paid===pf);
  });

  var body = document.getElementById('tableBody');
  if (!rows.length) {
    body.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-light)">ไม่พบข้อมูล</td></tr>';
  } else {
    body.innerHTML = rows.map(function(d) {
      var id  = gid(d);
      var rem = getRemaining(id);
      var cls = rem < d.boxes*d.perBox*0.2 ? 'low' : 'ok';
      var pu  = d.perBox > 0 ? (d.pricePerBox/d.perBox).toFixed(2) : '—';
      return '<tr onclick="openDetail(\''+id+'\')">'
        +'<td>'+formatDate(d.date)+'</td>'
        +'<td class="drug-name">'+d.name+'</td>'
        +'<td>'+d.boxes+'</td>'
        +'<td>'+d.perBox+'</td>'
        +'<td>'+(+d.pricePerBox).toLocaleString()+' ฿</td>'
        +'<td>'+pu+' ฿</td>'
        +'<td class="td-remaining '+cls+'">'+rem+'<span style="font-size:11px;font-weight:400;color:var(--text-light)"> ชิ้น</span></td>'
        +'<td><span class="source-tag">'+d.source+'</span></td>'
        +'<td><span class="badge '+(d.paid==='paid'?'badge-paid':'badge-unpaid')+'">'+(d.paid==='paid'?'✓ จ่ายแล้ว':'✗ ค้างจ่าย')+'</span></td>'
        +'</tr>';
    }).join('');
  }

  var totalRem = drugs.reduce(function(s,d){ return s+getRemaining(gid(d)); }, 0);
  var lowCnt   = drugs.filter(function(d){ return getRemaining(gid(d)) < d.boxes*d.perBox*0.2; }).length;
  var unpaid   = drugs.filter(function(d){ return d.paid==='unpaid'; }).length;
  document.getElementById('statTotal').innerHTML  = drugs.length+' <span class="stat-unit">รายการ</span>';
  document.getElementById('statUnits').innerHTML  = totalRem.toLocaleString()+' <span class="stat-unit">ชิ้น</span>';
  document.getElementById('statLow').innerHTML    = lowCnt+' <span class="stat-unit">รายการ</span>';
  document.getElementById('statUnpaid').innerHTML = unpaid+' <span class="stat-unit">รายการ</span>';
}

// ===== ADD =====
function openAddModal() {
  document.getElementById('addDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('addModal').classList.add('open');
}
function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }

function saveAdd() {
  var name        = document.getElementById('addName').value.trim();
  var boxes       = parseInt(document.getElementById('addBoxes').value);
  var perBox      = parseInt(document.getElementById('addPerBox').value);
  var pricePerBox = parseFloat(document.getElementById('addPriceBox').value);
  var date        = document.getElementById('addDate').value;
  var source      = document.getElementById('addSource').value.trim() || 'ไม่ระบุ';
  var paid        = document.getElementById('addPaid').value;

  if (!name||!boxes||!perBox||!pricePerBox||!date) { showToast('กรุณากรอกข้อมูลให้ครบ'); return; }

  var newRef = db.ref('drugs').push();
  newRef.set({ date:date, name:name, boxes:boxes, perBox:perBox, pricePerBox:pricePerBox, source:source, paid:paid });
  db.ref('movements').push({ drugId:newRef.key, type:'in', qty:boxes*perBox, date:date, time:nowTime(), note:'รับของครั้งแรก' });

  showToast('✓ เพิ่มรายการเรียบร้อย');
  closeAddModal();
  ['addName','addBoxes','addPerBox','addPriceBox','addSource'].forEach(function(i){ document.getElementById(i).value=''; });
}

// ===== REDUCE =====
function openReduceModal() {
  document.getElementById('reduceDrug').innerHTML = drugs.map(function(d){
    return '<option value="'+gid(d)+'">'+d.name+' (เหลือ: '+getRemaining(gid(d))+' ชิ้น)</option>';
  }).join('');
  document.getElementById('reduceDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('reduceTime').value = nowTime();
  document.getElementById('reduceModal').classList.add('open');
}
function closeReduceModal() { document.getElementById('reduceModal').classList.remove('open'); }

function saveReduce() {
  var drugId = document.getElementById('reduceDrug').value;
  var qty    = parseInt(document.getElementById('reduceQty').value);
  var date   = document.getElementById('reduceDate').value;
  var time   = document.getElementById('reduceTime').value;
  var note   = document.getElementById('reduceNote').value.trim() || 'ใช้ออก';

  if (!qty||qty<=0) { showToast('กรุณาระบุจำนวน'); return; }
  var rem = getRemaining(drugId);
  if (qty > rem) { showToast('คงเหลือเพียง '+rem+' ชิ้น'); return; }

  db.ref('movements').push({ drugId:drugId, type:'out', qty:qty, date:date, time:time, note:note });
  showToast('✓ บันทึกการใช้ยาเรียบร้อย');
  closeReduceModal();
  document.getElementById('reduceQty').value  = '';
  document.getElementById('reduceNote').value = '';
}

// ===== DETAIL =====
function openDetail(id) {
  currentDrugId = id;
  currentDetailFilter = 'all';
  var drug = null;
  for (var i=0;i<drugs.length;i++){ if(gid(drugs[i])===id){ drug=drugs[i]; break; } }
  if (!drug) return;

  document.getElementById('detailName').textContent = drug.name;
  document.getElementById('detailSub').textContent  = 'ที่มา: '+drug.source+' | ซื้อเมื่อ '+formatDate(drug.date);

  var rem=getRemaining(id), inT=0, outT=0;
  movements.forEach(function(m){
    if(m.drugId!==id) return;
    if(m.type==='in') inT+=m.qty; else outT+=m.qty;
  });

  document.getElementById('detailSummary').innerHTML =
    '<div class="stat-card sage"><div class="stat-label">นำเข้าทั้งหมด</div><div class="stat-value">'+inT+' <span class="stat-unit">ชิ้น</span></div></div>'
   +'<div class="stat-card brick"><div class="stat-label">ใช้ออกทั้งหมด</div><div class="stat-value">'+outT+' <span class="stat-unit">ชิ้น</span></div></div>'
   +'<div class="stat-card rose"><div class="stat-label">คงเหลือ</div><div class="stat-value" style="font-weight:800">'+rem+' <span class="stat-unit">ชิ้น</span></div></div>';

  document.querySelectorAll('.filter-tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.filter-tab')[0].classList.add('active');
  renderTimeline();
  document.getElementById('detailPage').classList.add('open');
  window.scrollTo(0,0);
}

function renderTimeline() {
  var mvs = movements.filter(function(m){
    return m.drugId===currentDrugId && (currentDetailFilter==='all'||m.type===currentDetailFilter);
  }).sort(function(a,b){
    return new Date(b.date+'T'+(b.time||'00:00')) - new Date(a.date+'T'+(a.time||'00:00'));
  });

  var c = document.getElementById('timelineContainer');
  if (!mvs.length) {
    c.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div>ไม่มีข้อมูล</div></div>';
    return;
  }
  c.innerHTML = mvs.map(function(m,i){
    return '<div class="timeline-item">'
      +'<div class="tl-date-col"><div class="tl-date">'+formatDate(m.date)+'</div><div class="tl-time">'+(m.time||'')+'</div></div>'
      +'<div class="tl-line-col"><div class="tl-dot '+m.type+'"></div>'+(i<mvs.length-1?'<div class="tl-line"></div>':'')+'</div>'
      +'<div><div class="tl-card '+m.type+'">'
        +'<div class="tl-card-header">'
          +'<span class="tl-type '+m.type+'">'+(m.type==='in'?'▲ นำเข้า':'▼ ใช้ออก')+'</span>'
          +'<span class="tl-qty '+m.type+'">'+(m.type==='in'?'+':'-')+m.qty+' ชิ้น</span>'
        +'</div>'
        +'<div class="tl-note">'+m.note+'</div>'
      +'</div></div>'
    +'</div>';
  }).join('');
}

function filterTimeline(type,el) {
  currentDetailFilter = type;
  document.querySelectorAll('.filter-tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  renderTimeline();
}

function closeDetail() { document.getElementById('detailPage').classList.remove('open'); }

document.getElementById('addModal').addEventListener('click',    function(e){ if(e.target===this) closeAddModal(); });
document.getElementById('reduceModal').addEventListener('click', function(e){ if(e.target===this) closeReduceModal(); });
</script>

</body>
</html>
